services:
  db:
    image: docker.io/library/postgres:16-alpine
    environment:
      POSTGRES_USER: medbot
      POSTGRES_PASSWORD: medbot
      POSTGRES_DB: medbot
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U medbot"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: docker.io/library/redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  bot:
    image: localhost/med-bot:dev
    env_file: .env
    environment:
      # Переопределяет DATABASE_URL/REDIS_URL из .env для compose-сети
      DATABASE_URL: postgresql://medbot:medbot@db/medbot
      REDIS_URL: redis://redis:6379
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  # DV6: api и worker нужны для полноценного локального стенда (Mini App + очередь).
  api:
    image: localhost/med-bot:dev
    command: ["uvicorn", "api.main:app", "--host", "0.0.0.0", "--port", "8000"]
    env_file: .env
    environment:
      DATABASE_URL: postgresql://medbot:medbot@db/medbot
      REDIS_URL: redis://redis:6379
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  worker:
    image: localhost/med-bot:dev
    command: ["arq", "worker.WorkerSettings"]
    env_file: .env
    environment:
      DATABASE_URL: postgresql://medbot:medbot@db/medbot
      REDIS_URL: redis://redis:6379
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pgdata:
