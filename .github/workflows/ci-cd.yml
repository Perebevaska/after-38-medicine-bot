name: CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

# DV5: не допускать гонок деплоя при нескольких пушах в main.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # ── Тесты ──────────────────────────────────────────────────────────────────
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: medbot
          POSTGRES_PASSWORD: medbot
          POSTGRES_DB: medbot_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379
    steps:
      - uses: actions/checkout@v4.2.2
      - uses: actions/setup-python@v5.6.0
        with:
          python-version: '3.14'
          allow-prereleases: true
          cache: pip
      # DV3: тестируем на тех же пинах, что и прод (requirements-lock.txt).
      - run: pip install -r requirements-lock.txt
      - run: python -m pytest -q

  # ── Фронт: type-check + сборка (MF1 — гейт на PR, а не только при деплое) ───
  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: miniapp
    steps:
      - uses: actions/checkout@v4.2.2
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: miniapp/package-lock.json
      - run: npm ci
      # Жёсткий гейт: tsc -b + vite build (ловит то, что иначе валит прод-деплой).
      - run: npm run build
      # Lint — информационно (есть унаследованный долг set-state-in-effect).
      - run: npm run lint
        continue-on-error: true

  # ── Сборка образа → ghcr.io (только main) ──────────────────────────────────
  build:
    needs: [test, frontend]
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4.2.2
      - name: Set lowercase image name
        run: echo "IMAGE=ghcr.io/$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v5
        with:
          context: .
          file: Containerfile
          push: true
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ github.sha }}

  # ── Деплой на VPS (только main, после успешной сборки) ─────────────────────
  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: SSH Deploy
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            cd /root/after-30-medicine-bot
            # DV4: атомарный деплой с откатом по /health.
            PREV=$(git rev-parse HEAD)
            git pull origin main
            source venv/bin/activate
            pip install -r requirements-lock.txt -q
            cd miniapp && npm ci && npm run build && cd ..
            systemctl restart medbot-bot medbot-api medbot-worker
            # Ждём, пока поднимется API; до 5 попыток.
            ok=0
            for i in 1 2 3 4 5; do
              sleep 3
              if curl -fsS http://localhost:8000/health > /dev/null; then ok=1; break; fi
            done
            if [ "$ok" != "1" ]; then
              echo "Health check провален — откат на $PREV"
              git reset --hard "$PREV"
              pip install -r requirements-lock.txt -q
              cd miniapp && npm ci && npm run build && cd ..
              systemctl restart medbot-bot medbot-api medbot-worker
              exit 1
            fi
